model: tinycd
run_name: tinycd_overfit
model_kwargs:
  variant: official
  pretrained: false
  output_layer: "3"
  freeze_backbone: false
data_root: data/LEVIR_CD_TINYCD_OVERFIT_256
output_dir: results
seed: 42
train:
  epochs: 100
  batch_size: 4
  lr: 0.001
  weight_decay: 0.0
  num_workers: 0
  augment: false
  pos_weight: auto
  pos_weight_max: 10.0
  gradient_clip: 1.0
  scheduler: cosine
  val_thresholds: [0.2, 0.25, 0.3, 0.35, 0.4, 0.45, 0.5, 0.55, 0.6, 0.65, 0.7]
  max_train_batches: null
  max_val_batches: null
